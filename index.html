<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sudoku Lab</title>
  <meta name="description" content="支持普通数独与杀手数独的纯前端静态站点，可直接部署到 GitHub Pages。">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <h1 class="pixel-title" aria-label="数独">
        <span class="pixel-title-mark">数</span>
        <span class="pixel-title-mark accent">独</span>
      </h1>
    </header>

    <main class="layout">
      <aside class="panel records-panel">
        <div class="records-panel-header">
          <h2>已通关</h2>
          <span id="recordsPanelStatus">加载中...</span>
        </div>
        <div id="recordsPanelList" class="records-list" aria-live="polite"></div>
      </aside>

      <section class="panel board-panel">
        <div class="board-toolbar">
          <div class="toolbar-pill subtle" id="storageBadge">日期 --</div>
          <div class="toolbar-pill subtle" id="timerPill">耗时 00:00</div>
        </div>
        <div id="boardWrap" class="board-wrap">
          <div id="boardLoading" class="board-loading">正在生成今日数独...</div>
          <div id="boardRoot" class="board-root" aria-live="polite"></div>
        </div>
      </section>

      <section class="panel keypad-panel">
        <h2>数字键盘</h2>
        <div id="keypad" class="keypad"></div>
        <button id="clearCellButton" class="ghost-button full-width">清空当前格子</button>
        <div id="notesPanel" class="notes-panel">
          <div class="notes-panel-header">
            <span>候选数</span>
            <strong id="notesCellLabel">未选中</strong>
          </div>
          <div id="notesPanelGrid" class="notes-panel-grid"></div>
        </div>
      </section>
    </main>
  </div>

  <div id="completionModal" class="completion-modal" aria-hidden="true">
    <div class="completion-modal-backdrop"></div>
    <div class="completion-modal-card" role="dialog" aria-modal="true" aria-labelledby="completionTitle">
      <div id="completionConfetti" class="completion-confetti" aria-hidden="true"></div>
      <p class="completion-kicker">挑战完成</p>
      <h2 id="completionTitle">恭喜通关</h2>
      <p id="completionMessage" class="completion-message">你已经完成今日数独。</p>
      <button id="completionCloseButton" class="ghost-button" type="button">收下祝贺</button>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
</body>
</html>
